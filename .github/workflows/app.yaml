name: Run Web App

on:
  push:
    branches:
      - main

jobs:
  run-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t myapp .

      - name: Run Container
        run: docker run -d -p 5000:5000 myapp

      - name: Test in Browser
        run: curl http://localhost:5000